<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Télécharger l'APK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-container">
    <section class="card">
      <div class="hero">
        <h1>APK Chants & Cantique Religieux CAC</h1>
        <p>Page de téléchargement direct pour ton APK religieux hébergé dans une GitHub Release.</p>
      </div>

      <div id="status" class="status">Chargement du lien de téléchargement…</div>

      <div class="download-card hidden" id="downloadCard">
        <div>
          <h2 id="releaseName">Release disponible</h2>
          <p id="releaseTag"></p>
          <p id="assetLabel"></p>
        </div>
        <a id="downloadButton" class="download-btn" href="#" target="_blank" rel="noopener">Télécharger l'APK</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
